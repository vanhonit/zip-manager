name: Build Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: |
          cd docs
          bundle install

      - name: Build site
        run: |
          cd docs
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production