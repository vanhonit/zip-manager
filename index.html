<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rusty Compress</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #f8faff;
            }

            /* ── backdrop ───────────────────────────────────────── */
            #root-spinner {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 40px;
                background: radial-gradient(
                    ellipse 90% 70% at 50% 45%,
                    #eef3ff 0%,
                    #f5f7ff 50%,
                    #fff 100%
                );
                font-family:
                    Inter,
                    system-ui,
                    -apple-system,
                    sans-serif;
                overflow: hidden;
                z-index: 9999;
                animation: fadeIn 0.4s ease both;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* ── soft ambient blobs ─────────────────────────────── */
            .blob {
                position: absolute;
                border-radius: 50%;
                pointer-events: none;
                filter: blur(72px);
            }
            .blob-1 {
                width: 500px;
                height: 500px;
                top: -160px;
                left: -140px;
                background: radial-gradient(
                    circle,
                    rgba(99, 102, 241, 0.14) 0%,
                    transparent 70%
                );
                animation: drift1 9s ease-in-out infinite alternate;
            }
            .blob-2 {
                width: 420px;
                height: 420px;
                bottom: -120px;
                right: -100px;
                background: radial-gradient(
                    circle,
                    rgba(59, 130, 246, 0.12) 0%,
                    transparent 70%
                );
                animation: drift2 11s ease-in-out infinite alternate;
            }
            .blob-3 {
                width: 280px;
                height: 280px;
                top: 30%;
                left: 60%;
                background: radial-gradient(
                    circle,
                    rgba(167, 139, 250, 0.1) 0%,
                    transparent 70%
                );
                animation: drift1 7s ease-in-out infinite alternate-reverse;
            }
            @keyframes drift1 {
                from {
                    transform: translate(0px, 0px) scale(1);
                }
                to {
                    transform: translate(40px, 28px) scale(1.1);
                }
            }
            @keyframes drift2 {
                from {
                    transform: translate(0px, 0px) scale(1);
                }
                to {
                    transform: translate(-30px, 20px) scale(1.08);
                }
            }

            /* ── ring stage ─────────────────────────────────────── */
            .stage {
                position: relative;
                width: 180px;
                height: 180px;
                flex-shrink: 0;
                animation: stagePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            }
            @keyframes stagePop {
                from {
                    transform: scale(0.6);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* ── rings ──────────────────────────────────────────── */
            .ring {
                position: absolute;
                border-radius: 50%;
                border-style: solid;
                border-color: transparent;
            }

            /* outer – slow CW, indigo arc */
            .ring-outer {
                inset: 0;
                border-width: 3px;
                border-top-color: #6366f1;
                border-right-color: rgba(99, 102, 241, 0.4);
                box-shadow:
                    0 0 20px 3px rgba(99, 102, 241, 0.18),
                    inset 0 0 20px 2px rgba(99, 102, 241, 0.06);
                animation: spinCW 2.8s linear infinite;
            }

            /* mid – medium CCW, blue arc */
            .ring-mid {
                inset: 18px;
                border-width: 2.5px;
                border-top-color: #3b82f6;
                border-left-color: rgba(59, 130, 246, 0.45);
                box-shadow: 0 0 14px 2px rgba(59, 130, 246, 0.18);
                animation: spinCCW 1.8s linear infinite;
            }

            /* inner – fast CW, violet arc */
            .ring-inner {
                inset: 36px;
                border-width: 2px;
                border-top-color: #a78bfa;
                border-right-color: rgba(167, 139, 250, 0.35);
                animation: spinCW 1.1s linear infinite;
            }

            @keyframes spinCW {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes spinCCW {
                to {
                    transform: rotate(-360deg);
                }
            }

            /* ── orbiting glowing dots ──────────────────────────── */
            .orbit-track {
                position: absolute;
                border-radius: 50%;
                animation: spinCW 2.8s linear infinite;
            }
            .orbit-track-1 {
                inset: 0;
            }
            .orbit-track-2 {
                inset: 18px;
                animation-direction: reverse;
                animation-duration: 1.8s;
            }

            .orbit-dot {
                position: absolute;
                border-radius: 50%;
            }
            /* top-centre of each track */
            .orbit-dot-1 {
                top: -5px;
                left: 50%;
                transform: translateX(-50%);
                width: 10px;
                height: 10px;
                background: #6366f1;
                box-shadow: 0 0 10px 3px rgba(99, 102, 241, 0.7);
            }
            .orbit-dot-2 {
                bottom: -4px;
                left: 50%;
                transform: translateX(-50%);
                width: 7px;
                height: 7px;
                background: #60a5fa;
                box-shadow: 0 0 8px 3px rgba(96, 165, 250, 0.65);
            }

            /* ── glowing core ───────────────────────────────────── */
            .core {
                position: absolute;
                inset: 52px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    #3b82f6 0%,
                    #6366f1 60%,
                    #8b5cf6 100%
                );
                display: flex;
                align-items: center;
                justify-content: center;
                animation: corePulse 2.2s ease-in-out infinite;
            }
            @keyframes corePulse {
                0%,
                100% {
                    box-shadow:
                        0 0 0 7px rgba(99, 102, 241, 0.12),
                        0 0 30px 8px rgba(99, 102, 241, 0.32),
                        0 6px 24px rgba(59, 130, 246, 0.4);
                }
                50% {
                    box-shadow:
                        0 0 0 12px rgba(99, 102, 241, 0.08),
                        0 0 48px 14px rgba(99, 102, 241, 0.2),
                        0 6px 32px rgba(59, 130, 246, 0.28);
                }
            }

            .core-icon {
                width: 30px;
                height: 30px;
                fill: #fff;
                filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.25));
            }

            /* ── text block ─────────────────────────────────────── */
            .text-block {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.15s
                    both;
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .app-name {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -0.03em;
                background: linear-gradient(
                    90deg,
                    #1e3a8a 0%,
                    #4f46e5 30%,
                    #7c3aed 55%,
                    #3b82f6 80%,
                    #1e3a8a 100%
                );
                background-size: 220% auto;
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: shimmer 3.5s linear infinite;
            }
            @keyframes shimmer {
                from {
                    background-position: 0% center;
                }
                to {
                    background-position: 220% center;
                }
            }

            .tagline {
                font-size: 13px;
                color: #94a3b8;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                font-weight: 500;
            }

            /* ── loading dots ───────────────────────────────────── */
            .dots {
                display: flex;
                gap: 7px;
                align-items: center;
                margin-top: 2px;
            }
            .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                animation: dotPop 1.4s ease-in-out infinite;
            }
            .dot:nth-child(1) {
                background: #6366f1;
                animation-delay: 0s;
            }
            .dot:nth-child(2) {
                background: #818cf8;
                animation-delay: 0.18s;
            }
            .dot:nth-child(3) {
                background: #a5b4fc;
                animation-delay: 0.36s;
            }
            .dot:nth-child(4) {
                background: #c7d2fe;
                animation-delay: 0.54s;
            }

            @keyframes dotPop {
                0%,
                60%,
                100% {
                    transform: scale(0.65);
                    opacity: 0.45;
                }
                30% {
                    transform: scale(1.15);
                    opacity: 1;
                }
            }

            /* ── progress bar ───────────────────────────────────── */
            .progress-wrap {
                width: 180px;
                height: 3px;
                border-radius: 99px;
                background: rgba(99, 102, 241, 0.12);
                overflow: hidden;
                animation: slideUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.25s
                    both;
            }
            .progress-bar {
                height: 100%;
                border-radius: 99px;
                background: linear-gradient(90deg, #6366f1, #3b82f6, #8b5cf6);
                background-size: 200% 100%;
                animation:
                    progressSlide 2s ease-in-out infinite,
                    shimmerBar 2s linear infinite;
            }
            @keyframes progressSlide {
                0% {
                    width: 0%;
                    margin-left: 0;
                }
                50% {
                    width: 75%;
                    margin-left: 0;
                }
                100% {
                    width: 0%;
                    margin-left: 100%;
                }
            }
            @keyframes shimmerBar {
                from {
                    background-position: 0% 0;
                }
                to {
                    background-position: 200% 0;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="root-spinner">
                <!-- ambient blobs -->
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
                <div class="blob blob-3"></div>

                <!-- ring stage -->
                <div class="stage">
                    <!-- spinning rings -->
                    <div class="ring ring-outer"></div>
                    <div class="ring ring-mid"></div>
                    <div class="ring ring-inner"></div>

                    <!-- orbiting dots -->
                    <div class="orbit-track orbit-track-1">
                        <div class="orbit-dot orbit-dot-1"></div>
                    </div>
                    <div class="orbit-track orbit-track-2">
                        <div class="orbit-dot orbit-dot-2"></div>
                    </div>

                    <!-- glowing core with archive icon -->
                    <div class="core">
                        <svg
                            class="core-icon"
                            viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M3 3h18a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 4h16v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7zm5 4v2h4v-2h-4z"
                            />
                        </svg>
                    </div>
                </div>

                <!-- text -->
                <div class="text-block">
                    <span class="app-name">Rusty Compress</span>
                    <span class="tagline">Archive Manager</span>
                    <div class="dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>

                <!-- indeterminate progress bar -->
                <div class="progress-wrap">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
