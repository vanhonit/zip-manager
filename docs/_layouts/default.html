<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ 'assets/css/style.css' | relative_url }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.author }}">
    <link rel="icon" type="image/png" href="{{ 'assets/img/icon.png' | relative_url }}">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ '/' | relative_url }}" class="site-title">
                    <img src="{{ 'assets/img/icon.png' | relative_url }}" alt="{{ site.title }}" class="logo">
                    <h1>{{ site.title }}</h1>
                </a>
                <nav class="main-nav">
                    {% for item in site.nav %}
                    <a href="{{ item.url | relative_url }}" class="nav-link{% if page.url == item.url %} active{% endif %}">{{ item.title }}</a>
                    {% endfor %}
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Rusty Compress</h3>
                    <p>{{ site.description }}</p>
                </div>
                <div class="footer-section">
                    <h3>Quick Links</h3>
                    {% for item in site.nav %}
                    <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
                    {% endfor %}
                </div>
                <div class="footer-section">
                    <h3>Connect</h3>
                    <a href="https://github.com/{{ site.github_username }}/{{ site.github_repository }}" target="_blank">
                        <i class="github-icon">GitHub</i>
                    </a>
                    <a href="https://github.com/{{ site.github_username }}/{{ site.github_repository }}/issues" target="_blank">
                        <i class="issues-icon">Issues</i>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with Tauri and React.</p>
            </div>
        </div>
    </footer>

    <script src="{{ 'assets/js/main.js' | relative_url }}"></script>
</body>
</html>
